name: sla-industries CI

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Version
        id: get-version
        run: echo "version=$(node ./.github/workflows/get-version.js)" >> "$GITHUB_OUTPUT"

      - name: Build and package release zip
        run: npm run package

      - name: Copy manifest for release asset
        run: cp dist/system.json system.json

      - name: Create Release
        id: create_versioned_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: Release ${{ steps.get-version.outputs.version }}
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./system.json,./sla-industries.zip"
          tag: ${{ steps.get-version.outputs.version }}

      - name: Create Latest release
        id: create_latest_release
        uses: ncipollo/release-action@v1
        if: endsWith(github.ref, 'master')
        with:
          allowUpdates: true
          name: Latest
          draft: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./system.json,./sla-industries.zip"
          tag: latest
